user              nginx;
worker_processes  1;

events {
  worker_connections  1024;
}

http {
  include           mime.types;
  default_type      application/octet-stream;
  keepalive_timeout 65;
  sendfile          on;
  resolver          $PROXY_DNS_RESOLVER valid=30s;

  # this is necessary for us to be able to disable request buffering in all cases
  proxy_http_version 1.1;

  # add all custom http configuration
  include $NGINX_CONFIG_DIR/http/*.conf;

  server {
    # add all custom server configuration
    include $NGINX_CONFIG_DIR/server/*.conf;

    # configure listener options based on ssl vs non-ssl
    listen $PROXY_$PROXY_PORT $PROXY_LISTENER_OPTIONS default_server;

    # disable any limits to avoid HTTP 413 for large image uploads
    client_max_body_size 0;

    # required to avoid HTTP 411: see Issue #1486 (https://github.com/moby/moby/issues/1486)
    chunked_transfer_encoding on;

    # increases timeouts to avoid HTTP 504
    proxy_connect_timeout  3s;
    proxy_read_timeout     300s;
    proxy_send_timeout     300s;
    send_timeout           300s;

    # disable proxy request buffering
    proxy_request_buffering off;
  }
}
